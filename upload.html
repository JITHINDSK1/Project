<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Note - StudyShare</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand">StudyShare</a>
            <button class="nav-toggle" id="navToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="profile.html" id="nav-profile" class="nav-link">Profile</a></li>
                <li><a href="#" id="nav-logout" class="nav-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="glass-panel auth-container" style="max-width: 600px;">
            <div class="auth-header">
                <h2>Share a Note</h2>
                <p class="text-muted">Help your peers by sharing your academic materials</p>
            </div>

            <form id="uploadForm">
                <div class="form-group">
                    <label for="noteTitle" class="form-label">Note Title</label>
                    <input type="text" id="noteTitle" class="form-control" placeholder="E.g. Midterm Physics Summary"
                        required>
                </div>

                <div class="form-group">
                    <label for="noteSubject" class="form-label">Subject</label>
                    <select id="noteSubject" class="form-control" required>
                        <option value="" disabled selected>Select a subject</option>
                        <option value="DSA">Data Structures & Algorithms</option>
                        <option value="Web Dev">Web Development</option>
                        <option value="DBMS">Database Management</option>
                        <option value="OS">Operating Systems</option>
                        <option value="Math">Mathematics</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="noteDesc" class="form-label">Description (Optional)</label>
                    <textarea id="noteDesc" class="form-control"
                        placeholder="Briefly describe what this note covers..."></textarea>
                </div>

                <div class="form-group">
                    <label for="noteFile" class="form-label">Upload File (PDF, Image, Docx - Max 10MB)</label>
                    <input type="file" id="noteFile" class="form-control" accept=".pdf,.png,.jpg,.jpeg,.docx" required>
                </div>

                <p id="uploadError" class="error-message"></p>

                <button type="submit" id="uploadBtn" class="btn btn-primary btn-block mt-md">Upload to
                    StudyShare</button>
            </form>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/upload.js"></script>
</body>

</html>
