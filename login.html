<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyShare</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand">StudyShare</a>
            <button class="nav-toggle" id="navToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="signup.html" class="btn btn-primary">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="glass-panel auth-container">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p class="text-muted">Login to access your notes</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="student@university.edu" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <p id="loginError" class="error-message"></p>

                <button type="submit" class="btn btn-primary btn-block mt-md">Login</button>
            </form>

            <div class="text-center mt-md">
                <p class="text-muted">Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
