<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyShare - Democratizing Learning</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* Hero Section specific styles */
        .hero {
            text-align: center;
            padding: var(--spacing-2xl) 0;
            position: relative;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 0 auto var(--spacing-xl);
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: var(--spacing-2xl);
            margin-top: var(--spacing-xl);
        }

        .stat-item h3 {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 0;
        }

        /* Dashboard specific */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }

        .search-bar {
            display: flex;
            gap: var(--spacing-sm);
            flex: 1;
            max-width: 500px;
        }

        .filters {
            display: flex;
            gap: var(--spacing-sm);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand">StudyShare</a>
            <button class="nav-toggle" id="navToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="upload.html" id="nav-upload" class="btn btn-secondary hidden">Upload Note</a></li>
                <li><a href="profile.html" id="nav-profile" class="nav-link hidden">Profile</a></li>
                <li><a href="#" id="nav-logout" class="nav-link hidden">Logout</a></li>
                <li><a href="login.html" id="nav-login" class="btn btn-primary">Login / Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <!-- Public Hero Section (shown when logged out) -->
        <section id="heroSection" class="hero">
            <h1>Community-driven note sharing.</h1>
            <p>Upload academic notes, access resources shared by other students, and democratize learning together.</p>

            <div style="max-width: 500px; margin: 0 auto 2rem auto;">
                <form id="heroSearchForm" class="flex gap-sm">
                    <input type="text" id="heroSearchInput" class="form-control"
                        placeholder="What subject are you looking for?" required>
                    <button type="submit" class="btn btn-primary" style="padding: 0 1.5rem;">Search</button>
                </form>
            </div>

            <div>
                <a href="signup.html" class="btn btn-secondary" style="padding: 1rem 2rem; font-size: 1.1rem;">Sign
                    Up</a>
                <a href="dashboard.html" class="btn btn-secondary"
                    style="padding: 1rem 2rem; font-size: 1.1rem; margin-left: var(--spacing-md);">Browse Collection</a>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script>
        // Hero Search Logic
        document.addEventListener('DOMContentLoaded', () => {
            const heroSearchForm = document.getElementById('heroSearchForm');
            if (heroSearchForm) {
                heroSearchForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const val = document.getElementById('heroSearchInput').value.trim();
                    if (val) {
                        window.location.href = `dashboard.html?search=${encodeURIComponent(val)}`;
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                });
            }
        });
    </script>
</body>

</html>
